version: '3.8'

services:
  # Oracle 23ai replaces the old Qdrant and Postgres databases for all APPLICATION data
  oracle23ai:
    image: gvenzl/oracle-free:latest
    environment:
      # Password must contain at least 1 uppercase, 1 lowercase, and 1 number
      - ORACLE_PASSWORD=${ORACLE_PWD:-AdminPassword123}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres kept ONLY for Airflow's internal metadata tracking
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-agent_state}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 5s
      retries: 5

  # Airflow Orchestration stack
  airflow-init:
    image: apache/airflow:2.9.1
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-agent_state}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=antigravity_secret_123
    command: bash -c "airflow db migrate && airflow users create -u airflow -p airflow -f Air -l Flow -r Admin -e admin@example.com || true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./airflow_dags:/opt/airflow/dags

  airflow-webserver:
    image: apache/airflow:2.9.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-agent_state}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=antigravity_secret_123
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - ./airflow-logs:/opt/airflow/logs

  airflow-scheduler:
    image: apache/airflow:2.9.1
    hostname: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-agent_state}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=antigravity_secret_123
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    command: scheduler
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - ./airflow-logs:/opt/airflow/logs

  # AI Dashboard (React)
  react_ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres-data:
  oracle-data:
